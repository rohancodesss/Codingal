<!DOCTYPE html>
<html>
<head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Form for personal details</title>
    <link href="style.css" rel="stylesheet" type="text/css">
 
</head>
<body>
    <h1> Personal Details Form</h1>
    <form>
        <fieldset> 
            <legend>Perosnal Information</legend>
        <label> Enter Name </label> 
        <input type="text" id="name" placeholder=" Enter name"> <br> <br>
        <label>  Enter Email ID </label>
        <input type="text" id="email" placeholder="Enter Email"> <br> <br>
         <label>Contact Number (this will be hidden)</label> 
        <input  type="password" id="password" placeholder="Contact Number (this will be hidden)"> <br> <br>
    
        <label> Gender </label> <br> 
        <input type="radio" id="female" name="Gender" value="Female"> Female <br>
    
        <input type="radio" name="Gender" id="Male" value="Male"> Male <br> <br>
        <label> Favourite City </label> <br>
        <input type="checkbox" id="city" value="NewDelhi"> NewDelhi <br> 
        <input type="checkbox" id="city" value="Mumbai"> Mumbai <br> <br>
        <label>Birthday</label>
        <input type="date" id="birthday" name="birthday" placeholder="Enter your  Birthday"> <br> <br>
        <label>Choose a city:</label>
<select name="city" id="city"> Choose a city
<option value="Mumbai">Mumbai</option>
<option value="Bangalore">Bangalore</option>
<option value="NewDelhi">NewDelhi</option>
<option value="Lucknow">Lucknow</option>
</select> <br> <br>

        <input type="submit"> 
        

        </fieldset>

    </form>
</body>
