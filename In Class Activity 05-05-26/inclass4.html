

<!DOCTYPE html>
<html>


<head>
<style>
*{
text-align: center;
font-family: monospace; 
}
#text{
text-shadow: 2px 2px 1px #CC5500; 
}

#box-shadow{
    background-color: blue;
    border: 2px solid red;
box-shadow: 9px 9px 5px #301934;
}

#indent{
text-indent: 50%;
}
</style>
</head>
<body>
    <div>
    <h1 id="text">We can use text shadow to give shadow to text itself</h1> 
    <p id="box-shadow"> Or we use box shadow to give shadow to the element </p> 
    <p id="indent"> This is an example of Indent</p>
    </div>

    </body>
</html>
